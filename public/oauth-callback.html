<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizando Login...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 217, 255, 0.2);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Retornando ao jogo...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const access_token = params.get('access_token');
        const user_id = params.get('user_id');
        const expires_in = params.get('expires_in') || 5184000;
        const signed_request = params.get('signed_request') || '';

        if (access_token && user_id) {
            const redirectUrl = `fbconnect://success?access_token=${access_token}&user_id=${user_id}&expires_in=${expires_in}&signed_request=${signed_request}&base_domain=onrender.com`;
            
            // Método 1: window.location.replace (Mais limpo)
            window.location.replace(redirectUrl);

            // Método 2: Clique simulado (Alguns WebViews exigem interação)
            setTimeout(() => {
                const link = document.createElement('a');
                link.href = redirectUrl;
                link.click();
            }, 100);

            // Método 3: window.open (Fallback extremo)
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500);

            // Se ainda estiver na tela após 2 segundos, tenta fechar a janela
            setTimeout(() => {
                window.close();
                // Se não fechar, mostra botão manual
                document.body.innerHTML = `
                    <div class="container">
                        <h2 style="color: #00d9ff;">Quase lá!</h2>
                        <p>Clique no botão abaixo para voltar ao jogo:</p>
                        <a href="${redirectUrl}" style="display: inline-block; padding: 15px 30px; background: #00d9ff; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px;">VOLTAR AO JOGO</a>
                    </div>
                `;
            }, 2000);
        } else {
            document.body.innerHTML = '<h2>Erro: Dados de login ausentes.</h2>';
        }
    </script>
</body>
</html>
