<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 217, 255, 0.2);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Processando login...</p>
    </div>

    <script>
        // Extrair parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const access_token = params.get('access_token');
        const user_id = params.get('user_id');
        const expires_in = params.get('expires_in') || 5184000;
        const signed_request = params.get('signed_request') || '';

        // Se temos os parâmetros
        if (access_token && user_id) {
            // Tentar redirecionar para o protocolo customizado do app
            const redirectUrl = `fbconnect://success?access_token=${access_token}&user_id=${user_id}&expires_in=${expires_in}&signed_request=${signed_request}&base_domain=onrender.com`;
            
            // Log para debug no console do navegador
            console.log("Redirecionando para:", redirectUrl);

            // Fazer redirect imediatamente
            window.location.replace(redirectUrl);
            
            // Tentativa secundária via meta refresh se o replace falhar
            const meta = document.createElement('meta');
            meta.httpEquiv = "refresh";
            meta.content = `0;url=${redirectUrl}`;
            document.getElementsByTagName('head')[0].appendChild(meta);

            // Se o redirect não funcionar em 3 segundos, mostrar mensagem
            setTimeout(() => {
                document.body.innerHTML = `
                    <div class="container">
                        <h2 style="color: #00d9ff; margin-bottom: 20px;">✅ Login Bem-Sucedido!</h2>
                        <div style="background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.3); border-radius: 8px; padding: 20px; margin: 20px auto; max-width: 300px; text-align: left;">
                            <p><strong>Token:</strong></p>
                            <p style="word-break: break-all; font-size: 12px; color: #00d9ff;">${access_token}</p>
                            <p style="margin-top: 15px;"><strong>User ID:</strong></p>
                            <p style="font-size: 14px; color: #00d9ff;">${user_id}</p>
                        </div>
                        <p style="margin-top: 30px; color: #aaa;">Você pode fechar esta aba e voltar ao jogo.</p>
                        <p style="margin-top: 10px; font-size: 12px; color: #666;">Se o jogo não responder, tente novamente.</p>
                    </div>
                `;
            }, 3000);
        } else {
            // Se não temos os parâmetros, mostrar erro
            document.body.innerHTML = `
                <div class="container">
                    <h2 style="color: #ff6b6b;">❌ Erro no Login</h2>
                    <p style="margin-top: 20px;">Parâmetros inválidos ou ausentes.</p>
                    <p style="margin-top: 20px;"><a href="/panel" style="color: #00d9ff; text-decoration: none; padding: 10px 20px; border: 1px solid #00d9ff; border-radius: 5px; display: inline-block;">Voltar ao Painel</a></p>
                </div>
            `;
        }
    </script>
</body>
</html>
