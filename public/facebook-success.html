<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial;
            color: #fff;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0,217,255,0.2);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Finalizando...</p>
    </div>
    <script>
        // Extrair parâmetros
        const params = new URLSearchParams(window.location.search);
        const access_token = params.get('access_token');
        const user_id = params.get('user_id');
        
        // Enviar dados para o app nativo (se disponível)
        if (window.android && window.android.onFacebookLoginSuccess) {
            window.android.onFacebookLoginSuccess(access_token, user_id);
        }
        
        // Fechar a aba após 2 segundos
        setTimeout(() => {
            window.close();
        }, 2000);
    </script>
</body>
</html>
