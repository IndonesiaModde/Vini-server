<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sucesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.6s ease-out;
        }
        
        h1 {
            color: #00d9ff;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Login Bem-Sucedido!</h1>
        <p>Você será redirecionado automaticamente...</p>
    </div>

    <script>
        // Extrair parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const access_token = params.get('access_token');
        const user_id = params.get('user_id');
        
        console.log('Access Token:', access_token);
        console.log('User ID:', user_id);
        
        // Tentar comunicar com o app nativo
        if (window.GameBridge) {
            window.GameBridge.onFacebookLoginSuccess(access_token, user_id);
        }
        
        // Tentar fazer redirect para protocolo customizado
        setTimeout(() => {
            window.location.href = 'fbconnect://success?access_token=' + access_token + '&user_id=' + user_id;
        }, 500);
    </script>
</body>
</html>
